<script>
const searchInput = document.getElementById('searchInput');
const itemList = document.getElementById('vnlist');
const items = itemList.getElementsByTagName('li');

searchInput.addEventListener('keyup', function() {
  const filter = searchInput.value.toLowerCase(); // Get user input and make it lowercase

  for (let i = 0; i < items.length; i++) {
    const textValue = items[i].textContent || items[i].innerText;
    
    // If the item text matches the search, show it; otherwise, hide it
    if (textValue.toLowerCase().indexOf(filter) > -1) {
      items[i].style.display = "";
    } else {
      items[i].style.display = "none";
    }
  }
});
</script>
